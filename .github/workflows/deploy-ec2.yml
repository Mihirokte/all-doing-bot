# Deploy FastAPI backend on your EC2 box (git pull, pip, systemd restart).
#
# Setup (repo Settings → Secrets and variables):
#   Secrets: EC2_HOST, EC2_SSH_KEY (private key PEM), EC2_USER (e.g. ubuntu)
# Optional:
#   Repository variable EC2_AUTO_DEPLOY = true  → runs on every push to main
#   If unset, only "Run workflow" (workflow_dispatch) deploys the backend.
#
# EC2 must have: repo at /home/ubuntu/all-doing-bot, venv, systemd unit "alldoing",
# Python 3.10+ in venv (required for langgraph + mcp).

name: Deploy backend (EC2)

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ec2-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || vars.EC2_AUTO_DEPLOY == 'true'
    steps:
      - name: Pull, install deps, restart alldoing
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script_stop: true
          script: |
            set -euo pipefail
            cd /home/ubuntu/all-doing-bot
            git fetch origin main
            git reset --hard origin/main
            source venv/bin/activate
            python --version
            pip install -r apps/backend/requirements.txt
            sudo systemctl restart alldoing
            sleep 2
            curl -sfS --max-time 15 http://127.0.0.1:8000/health | head -c 400
            echo ""
