# Deploy FastAPI backend on EC2 (git reset main, pip, systemd restart).
#
# One-time setup (repo Settings → Secrets and variables → Actions):
#   Secrets (required to run):
#     EC2_HOST      — e.g. ec2-54-165-94-30.compute-1.amazonaws.com
#     EC2_USER      — ec2-user (Amazon Linux) or ubuntu (Ubuntu AMI)
#     EC2_SSH_KEY   — full private key PEM (OpenSSH format), including BEGIN/END lines
#   Variables (optional):
#     EC2_AUTO_DEPLOY = true  → run on every push to main
#     If unset, only manual: Actions → Deploy backend (EC2) → Run workflow
#
# Server layout: repo at /home/$USER/all-doing-bot, venv, systemd unit alldoing.
# See: docs/deployment/github-actions-ec2-autodeploy.txt

name: Deploy backend (EC2)

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ec2-deploy
  cancel-in-progress: true

jobs:
  deploy:
    name: SSH pull + restart alldoing
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: github.event_name == 'workflow_dispatch' || vars.EC2_AUTO_DEPLOY == 'true'
    steps:
      - name: Check EC2 secrets are set
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
          EC2_SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
        run: |
          if [ -z "$EC2_HOST" ] || [ -z "$EC2_USER" ] || [ -z "$EC2_SSH_KEY" ]; then
            echo "::error::Add Actions secrets EC2_HOST, EC2_USER, EC2_SSH_KEY (see docs/deployment/github-actions-ec2-autodeploy.txt)"
            exit 1
          fi

      - name: Pull main, pip install, restart service, smoke checks
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          command_timeout: 12m
          script_stop: true
          script: |
            set -euo pipefail
            REPO_DIR="${REPO_DIR:-/home/${USER}/all-doing-bot}"
            cd "$REPO_DIR"
            git fetch origin main
            git reset --hard origin/main
            source venv/bin/activate
            python --version
            pip install -r apps/backend/requirements.txt
            sudo systemctl restart alldoing
            sleep 2
            echo "--- /health ---"
            curl -sfS --max-time 15 http://127.0.0.1:8000/health | head -c 500
            echo ""
            echo "--- workflow probe ---"
            curl -sS -o /dev/null -w "HTTP %{http_code}\n" "http://127.0.0.1:8000/workflows/tasks?session_key=gha-smoke&limit=1"
